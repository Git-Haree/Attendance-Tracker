<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Session Management — Create and manage lecture, lab, and tutorial sessions.">
  <title>Sessions — Attendance Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <button class="mobile-toggle" aria-label="Toggle sidebar">☰</button>
    <div class="sidebar-overlay"></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></div>
          <div>
            <span class="brand-text">College Attendance</span>
            <span class="brand-sub">Tracker</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Overview</div>
        <a href="index.html" class="nav-item">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span> Dashboard
        </a>
        <div class="nav-section-label">Management</div>
        <a href="students.html" class="nav-item">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span> Students
        </a>
        <a href="sessions.html" class="nav-item active">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span> Sessions
        </a>
        <a href="attendance.html" class="nav-item">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></span> Attendance
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle">
          <span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></span>
          <span>Appearance</span>
          <span class="toggle-track"></span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Sessions</h1>
        <p class="page-subtitle">Manage lecture, lab, and tutorial sessions</p>
      </div>

      <!-- Create Session Form -->
      <div class="card mb-24">
        <div class="card-header">
          <h2 class="card-title">Create New Session</h2>
        </div>
        <div class="card-body">
          <form id="session-form">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="subject_name">Subject</label>
                <input type="text" id="subject_name" class="form-control" placeholder="e.g. Data Structures" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="faculty_name">Faculty</label>
                <input type="text" id="faculty_name" class="form-control" placeholder="e.g. Dr. Sharma" required>
              </div>
            </div>
            <div class="form-row mt-16">
              <div class="form-group">
                <label class="form-label" for="session_date">Date</label>
                <input type="date" id="session_date" class="form-control" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="session_time">Time</label>
                <input type="time" id="session_time" class="form-control" required>
              </div>
              <div class="form-group" style="display:flex;align-items:flex-end;">
                <button type="submit" class="btn btn-primary" id="session-submit-btn">Create Session</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Sessions Table -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">All Sessions</h2>
          <span id="session-count" style="font-size:13px;color:var(--text-tertiary);"></span>
        </div>
        <div class="card-body no-padding">
          <div style="overflow-x:auto;">
            <table class="data-table" id="sessions-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Subject</th>
                  <th>Faculty</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Created</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="sessions-body">
                <tr><td colspan="7" class="text-center" style="padding:40px;color:var(--text-tertiary)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/sessions.js"></script>
</body>
</html>
